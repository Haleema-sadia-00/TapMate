name: tapmate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0  # IMPORTANT: 3.2.0 hi rakhna

dependencies:
  flutter:
    sdk: flutter

  # Firebase - STABLE VERSIONS
  firebase_core: ^2.15.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.8.0
  firebase_storage: ^11.2.0

  # UI & Utilities
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4
  http: ^1.1.0
  intl: ^0.18.1

  # 👇 EMOJI PICKER ADD KAR DIYA
  emoji_picker_flutter: ^3.1.0

  # Social Login
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.2.0

  # Other Packages (jo aapne batae the)
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.1
  font_awesome_flutter: ^10.7.0
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  showcaseview: ^3.0.0
  cloudinary_public: ^0.23.1
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/google_logo.png
    - assets/icons/facebook_logo.png